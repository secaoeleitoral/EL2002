<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Debug Tool</title>
</head>
<body>
    <h1>Debugging Options</h1>
    <div id="out"></div>

    <script src="js/candidates.js"></script>
    <script>
        // Copy verbatim logic from app.js
        fetch('data/stations.geojson').then(r=>r.json()).then(geojson => {
            const currentCargo = 'presidente_1t';
            const currentLocalId = null;
            const currentBairro = null;
            const currentMunicipio = '';

            const activeWinners = new Set();
            geojson.features.forEach((feature) => {
                if (currentLocalId && feature.properties.id !== currentLocalId) return;
                if (currentBairro && (feature.properties.municipio !== currentMunicipio || feature.properties.distrito !== currentBairro)) return;
                if (currentMunicipio && feature.properties.municipio !== currentMunicipio) return;
                
                let votes = feature.properties[currentCargo];
                if (!votes) {
                    const baseCargo = currentCargo.replace('_1t', '').replace('_2t', '');
                    votes = feature.properties[baseCargo] || feature.properties['votos_' + baseCargo] || {};
                }
                
                if (typeof votes === 'string') {
                    try { votes = JSON.parse(votes); } catch(e) { votes = {}; }
                }
                if (typeof votes !== 'object' || votes === null) votes = {};
                
                let maxVotes = -1;
                let topCode = null;
                for (const code in votes) {
                    if (typeof INVALID_CODES !== 'undefined' && !INVALID_CODES.has(code)) {
                        const v = Number(votes[code]) || 0;
                        if (v > maxVotes) {
                            maxVotes = v;
                            topCode = code;
                        }
                    }
                }
                if (topCode && maxVotes > 0) {
                    activeWinners.add(topCode);
                }
            });

            const cargoData = CANDIDATES[currentCargo];
            let entries = Object.entries(cargoData.candidates).filter(([code]) => !INVALID_CODES.has(code));
            
            entries = entries.filter(([code]) => activeWinners.has(code));

            document.getElementById('out').innerHTML = `
                <h2>2002 Presidente 1T</h2>
                <p>Features Total: ${geojson.features.length}</p>
                <p>Active Winners: ${Array.from(activeWinners).join(', ')}</p>
                <p>Entries length: ${entries.length}</p>
                <p>Entries: ${JSON.stringify(entries)}</p>
            `;
        });
    </script>
</body>
</html>
